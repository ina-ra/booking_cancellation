name: CI

on:
  push:
    branches: [main, master, develop, service, feature/minio-s3-tests, feature/s3-only-cleanup]
  pull_request:
    branches: [main, master, develop, service, feature/minio-s3-tests, feature/s3-only-cleanup]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run Pylint
        run: uv run pylint src

      - name: Run mypy
        run: uv run mypy src

      - name: Run tests
        run: uv run pytest --basetemp=.pytest_tmp -o cache_dir=.pytest_cache_local